services:
  operator:
    type: app
    build:
      type: dockerfile
      context: .
      dockerfile: Dockerfile
    domains:
      # Dashboard + API (main domain)
      - host: "$(PRIMARY_DOMAIN)"
        port: 3000
        https: true
      # Agent WebSocket
      - host: "agent-$(PRIMARY_DOMAIN)"
        port: 21291
        https: true
    env:
      # ─── Core ───
      NODE_ENV: "production"
      TZ: "America/Bogota"
      DISPLAY: ":99"
      OPERATOR_PORT: "3000"
      OPERATOR_HOST: "0.0.0.0"
      AGENT_WS_PORT: "21291"
      AGENT_SERVER_URL: "ws://localhost:21291/agent"

      # ─── Browser ───
      PUPPETEER_EXECUTABLE_PATH: "/usr/bin/chromium"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      CHROME_BIN: "/usr/bin/chromium"
      SCREENSHOT_QUALITY: "60"
      SCREENSHOT_SCALE: "0.75"

      # ─── AI Providers (Primary) ───
      OPENCODE_ZEN_API_KEY: "$(OPENCODE_ZEN_API_KEY)"
      OPENCODE_GO_API_KEY: "$(OPENCODE_GO_API_KEY)"
      GMI_API_KEY: "$(GMI_API_KEY)"

      # ─── AI Providers (Direct) ───
      GITHUB_COPILOT_TOKEN: "$(GITHUB_COPILOT_TOKEN)"
      ANTHROPIC_API_KEY: "$(ANTHROPIC_API_KEY)"
      OPENAI_API_KEY: "$(OPENAI_API_KEY)"
      GOOGLE_API_KEY: "$(GOOGLE_GENERATIVE_AI_API_KEY)"
      DEEPSEEK_API_KEY: "$(DEEPSEEK_API_KEY)"
      NVIDIA_API_KEY: "$(NVIDIA_API_KEY)"
      XAI_API_KEY: "$(XAI_API_KEY)"
      GLM_API_KEY: "$(GLM_API_KEY)"
      KIMI_API_KEY: "$(KIMI_API_KEY)"
      MINIMAX_API_KEY: "$(MINIMAX_API_KEY)"
      HF_TOKEN: "$(HF_TOKEN)"
      DASHSCOPE_API_KEY: "$(DASHSCOPE_API_KEY)"
      NOUS_API_KEY: "$(NOUS_API_KEY)"
      FREEMODEL_API_KEY: "$(FREEMODEL_API_KEY)"

      # ─── Server Auth ───
      OPERATOR_API_KEY: "$(OPERATOR_API_KEY)"
      OPERATOR_JWT_SECRET: "$(OPERATOR_JWT_SECRET)"

      # ─── Auto-Restart Config ───
      RESTART_COOLDOWN_MS: "300000"
      MAX_RESTART_ATTEMPTS: "10"

      # ─── Facebook Ads ───
      FACEBOOK_ACCESS_TOKEN: "$(FACEBOOK_ACCESS_TOKEN)"
      FACEBOOK_AD_ACCOUNT: "$(FACEBOOK_AD_ACCOUNT_ID)"
      FACEBOOK_PAGE_ID: "$(FACEBOOK_PAGE_ID)"

      # ─── Notifications ───
      TELEGRAM_BOT_TOKEN: "$(TELEGRAM_BOT_TOKEN)"
      TELEGRAM_CHAT_ID: "$(TELEGRAM_CHAT_ID)"
      SLACK_WEBHOOK_URL: "$(SLACK_WEBHOOK_URL)"

      # ─── Custom Skills ───
      CLARO_SKILL_SRC: "/app/skills/claro-agent/src"
      CLARO_SKILL_DATA: "/app/skills-data/claro-agent"
      CLARO_FORM_URL: "$(CLARO_FORM_URL)"
      PREOP_SKILL_SRC: "/app/skills/preoperacional-nova/src"
      PREOP_SKILL_DATA: "/app/skills-data/preoperacional-nova"
      PREOP_URL: "$(PREOP_URL)"
      PREOP_EMAIL: "$(PREOP_EMAIL)"
      PREOP_PASSWORD: "$(PREOP_PASSWORD)"
      PREOP_SUPERVISOR: "$(PREOP_SUPERVISOR)"
      PREOP_SCHEDULE_HOUR: "$(PREOP_SCHEDULE_HOUR)"
      PREOP_SCHEDULE_MINUTE: "$(PREOP_SCHEDULE_MINUTE)"

    mounts:
      - type: volume
        name: operator-data-v4
        mountPath: /app/data
      - type: volume
        name: operator-workspace
        mountPath: /workspace
      - type: volume
        name: operator-screenshots
        mountPath: /app/screenshots
      - type: volume
        name: operator-logs
        mountPath: /app/logs
      - type: volume
        name: operator-skills-data
        mountPath: /app/skills-data
      - type: volume
        name: operator-memory
        mountPath: /app/operator/memory
