# ============================================================
# OpenCode Evolved — Configuración para EasyPanel
# ============================================================
# Instrucciones:
#   1. Sube este repo a GitHub
#   2. En EasyPanel: New Project → Add Service → App
#   3. Source: GitHub → selecciona tu repo
#   4. EasyPanel detecta el Dockerfile automáticamente
#   5. Configura las variables de entorno abajo
#   6. Crea un dominio (Domain) apuntando al puerto 3000
# ============================================================

services:
  opencode:
    type: app
    build:
      type: dockerfile
      file: Dockerfile
    domains:
      - host: "opencode.$(PRIMARY_DOMAIN)"
        port: 3000
        https: true
    ports:
      - published: 3000
        target: 3000
        protocol: tcp
    env:
      # ── Servidor ──────────────────────────────────────────
      PORT: "3000"
      OPENCODE_WORKSPACE: /workspace
      TZ: "America/Bogota"
      DISPLAY: ":99"
      OPERATOR_PORT: "3002"
      API_SERVER_PORT: "3002"

      # ── Seguridad (opcional pero recomendado) ─────────────
      OPENCODE_SERVER_PASSWORD: "6715320Dvd."

      # ── FreeModel (GPT-4o GRATIS — prioridad #1 para visión) ──
      FREEMODEL_API_KEY: "fe_oa_db8434da9d092b657e26dba8e2cdbf5cc460848f7e3b490c"
      FREEMODEL_BASE_URL: "https://api.freemodel.dev/v1"
      FREEMODEL_MODEL: "gpt-4o"

      # ── OpenAI ───────────────────────────────────────────
      OPENAI_API_KEY: "sk-YWevx8mah8rJrsUHuGydWhSYL3tYEyohCYOReAafifhj2m6Kb0La07ywx9Kpbbl7"

      # ── Anthropic Claude ─────────────────────────────────
