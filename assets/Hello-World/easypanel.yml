      GITHUB_TOKEN: "TU_GITHUB_TOKEN_AQUI"
      GITHUB_PERSONAL_ACCESS_TOKEN: ""

      # ── Base de datos Easypanel PostgreSQL ───────────────
      EASYPANEL_DATABASE_URL: "postgres://PostgreSQL:6715320D@tecnoia_tecnologi:5432/tecno?sslmode=disable"
      DB_HOST: "tecnoia_tecnologi"
      DB_PORT: "5432"
      DB_USER: "PostgreSQL"
      DB_PASSWORD: "6715320D"
