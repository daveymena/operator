    mounts:
      - type: volume
        name: opencode-workspace
        mountPath: /workspace
      - type: volume
        name: opencode-data
        mountPath: /root/.local/share/opencode
      - type: volume
        name: opencode-config
        mountPath: /root/.config/opencode
      - type: volume
        name: mimo-config
        mountPath: /root/.config/mimo

    resources:
      memoryLimit: 2048
      cpuLimit: 2

  # ── PostgreSQL (opcional si usas el de Easypanel) ──────────
