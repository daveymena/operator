<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Operator Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f13; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 12px 20px; border-bottom: 1px solid #2a2a3e; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; color: #00d4ff; }
  .header .status { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.green { background: #00ff88; }
  .status-dot.blue { background: #00d4ff; animation: pulse 1.5s infinite; }
  .status-dot.red { background: #ff4444; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* Chat Panel */
  .chat-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #2a2a3e; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .chat-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
  .chat-msg.user { background: #00d4ff22; border: 1px solid #00d4ff44; align-self: flex-end; border-bottom-right-radius: 4px; }
  .chat-msg.bot { background: #1a1a2e; border: 1px solid #2a2a3e; align-self: flex-start; border-bottom-left-radius: 4px; }
  .chat-msg.bot .model-tag { font-size: 10px; color: #666; margin-top: 4px; }
  .chat-msg.system { background: transparent; color: #666; font-size: 12px; align-self: center; font-style: italic; }
  .chat-msg.thinking { background: #1a1a2e; border: 1px solid #2a2a3e; align-self: flex-start; }
  .chat-msg.thinking::after { content: ''; display: inline-block; width: 6px; height: 6px; background: #00d4ff; border-radius: 50%; animation: pulse 1s infinite; margin-left: 8px; }
  .chat-input-bar { padding: 12px 16px; border-top: 1px solid #2a2a3e; display: flex; gap: 8px; }
  .chat-input-bar input { flex: 1; padding: 10px 14px; background: #0f0f13; border: 1px solid #2a2a3e; border-radius: 8px; color: #e0e0e0; font-size: 14px; }
  .chat-input-bar input:focus { outline: none; border-color: #00d4ff; }
  .chat-input-bar button { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-send { background: #00d4ff; color: #000; }
  .btn-send:hover { background: #00b8e0; }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-exec { background: #ff8800; color: #000; }
  .btn-exec:hover { background: #e07700; }

  /* Right Panel */
  .right-panel { width: 420px; display: flex; flex-direction: column; overflow: hidden; }
  .panel-tabs { display: flex; border-bottom: 1px solid #2a2a3e; }
  .panel-tab { flex: 1; padding: 10px; text-align: center; font-size: 12px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .panel-tab.active { color: #00d4ff; border-bottom-color: #00d4ff; }
  .panel-content { flex: 1; overflow-y: auto; padding: 12px; }
  .panel-section { display: none; }
  .panel-section.active { display: block; }

  .task-form { padding: 12px; border-bottom: 1px solid #2a2a3e; }
  .task-form label { display: block; margin-bottom: 4px; color: #888; font-size: 11px; text-transform: uppercase; }
  .task-form input, .task-form textarea { width: 100%; padding: 8px 10px; background: #0f0f13; border: 1px solid #2a2a3e; border-radius: 6px; color: #e0e0e0; font-size: 13px; margin-bottom: 8px; }
  .task-form textarea { resize: vertical; min-height: 60px; }
  .task-form .btn-row { display: flex; gap: 6px; }
  .task-form button { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-run { background: #00d4ff; color: #000; }
  .btn-run:hover { background: #00b8e0; }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-cancel { background: #ff4444; color: #fff; }
  .btn-cancel:hover { background: #cc0000; }
  .btn-cancel:disabled { opacity: 0.4; cursor: not-allowed; }

  .screenshot-box { border-radius: 8px; border: 1px solid #2a2a3e; overflow: hidden; margin-bottom: 8px; }
  .screenshot-box img { width: 100%; display: block; }
  .screenshot-placeholder { padding: 40px; text-align: center; color: #666; font-size: 13px; }

  .log-box { background: #0a0a0e; border-radius: 6px; padding: 8px; font-family: 'Consolas', monospace; font-size: 11px; line-height: 1.5; max-height: 300px; overflow-y: auto; }
  .log-line { color: #888; }
  .log-line.ai { color: #00d4ff; }
  .log-line.action { color: #00ff88; }
  .log-line.error { color: #ff4444; }

  .result-box { background: #0a0a0e; padding: 10px; border-radius: 6px; font-size: 12px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
</style>
</head>
<body>
<div class="header">
  <h1>🤖 Web Operator</h1>
  <p style="color:#888;font-size:12px;">Chat + Navegador + IA</p>
  <div class="status">
    <span id="statusBadge" class="status-dot gray"></span>
    <span id="statusText" style="font-size:12px;color:#888;">Conectando...</span>
  </div>
</div>

<div class="main">
  <!-- Chat Panel -->
  <div class="chat-panel">
    <div id="chatMessages" class="chat-messages">
      <div class="chat-msg system">Escribe un mensaje o describe una tarea para el navegador</div>
    </div>
    <div class="chat-input-bar">
      <input type="text" id="chatInput" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">Enviar</button>
      <button class="btn-exec" id="execBtn" onclick="execFromChat()">▶ Ejecutar</button>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="panel-tabs">
      <div class="panel-tab active" onclick="showTab('task')">📋 Tarea</div>
      <div class="panel-tab" onclick="showTab('screenshot')">📸 Pantalla</div>
      <div class="panel-tab" onclick="showTab('logs')">📝 Logs</div>
      <div class="panel-tab" onclick="showTab('result')">📊 Resultado</div>
    </div>

    <div class="panel-content">
      <!-- Task Tab -->
      <div id="tab-task" class="panel-section active">
        <div class="task-form">
          <label>URL inicial (opcional)</label>
          <input type="text" id="startUrl" placeholder="https://ejemplo.com">
          <label>Descripción de la tarea</label>
          <textarea id="taskInput" placeholder="Ej: Ve a Google, busca 'OpenCode' y haz clic en el primer resultado">explora la pagina y dime que contiene</textarea>
          <div class="btn-row">
            <button class="btn-run" id="runBtn" onclick="runTask()">▶ Ejecutar tarea</button>
            <button class="btn-cancel" id="cancelBtn" onclick="cancelTask()" disabled>■ Cancelar</button>
          </div>
        </div>
      </div>

      <!-- Screenshot Tab — Vista en vivo del navegador -->
      <div id="tab-screenshot" class="panel-section">
        <div style="background:#111;border:1px solid #2a2a3e;border-radius:8px 8px 0 0;padding:6px 10px;display:flex;align-items:center;gap:8px;font-size:11px;">
          <span style="width:8px;height:8px;border-radius:50%;background:#00ff88;display:inline-block;flex-shrink:0" id="liveDot"></span>
          <span id="liveUrl" style="color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">Esperando...</span>
          <span id="liveIter" style="color:#666;flex-shrink:0"></span>
        </div>
        <div id="screenshotContainer" class="screenshot-box" style="border-radius:0 0 8px 8px;border-top:none">
          <div class="screenshot-placeholder">El navegador aparecerá aquí cuando comience una tarea...</div>
        </div>
      </div>

      <!-- Logs Tab -->
      <div id="tab-logs" class="panel-section">
        <div id="logContainer" class="log-box"></div>
      </div>

      <!-- Result Tab -->
      <div id="tab-result" class="panel-section">
        <div id="resultContainer" class="result-box">Sin resultados</div>
      </div>
    </div>
  </div>
</div>

<script>
const ws = new WebSocket(`ws://${location.host}`);
let taskRunning = false;
let thinkingMsg = null;

ws.onopen = () => {
  document.getElementById('statusBadge').className = 'status-dot green';
  document.getElementById('statusText').textContent = 'Conectado';
};

ws.onmessage = (event) => {
  const data = JSON.parse(event.data);
  switch (data.type) {
    case 'connected':
      addSystem('Sistema conectado');
      break;
    case 'screenshot':
      // 📡 Screenshot en vivo — mostrar inmediatamente en la pestaña Pantalla
      showScreenshot(data.data);
      if (data.url) document.getElementById('liveUrl') && (document.getElementById('liveUrl').textContent = data.url);
      if (data.iteration) document.getElementById('liveIter') && (document.getElementById('liveIter').textContent = `Iteración ${data.iteration}/${data.maxIterations}`);
      break;
    case 'task_started':
      taskRunning = true;
      updateUI();
      addSystem('🚀 Tarea iniciada');
      removeThinking();
      showTab('screenshot'); // Auto-activar la pestaña de pantalla al iniciar tarea
      break;
    case 'task_completed':
      taskRunning = false;
      updateUI();
      removeThinking();
      addBot('✅ Tarea completada: ' + (data.result?.message || ''), 'operator');
      if (data.result?.pageContent) {
        addBot('📄 Contenido extraído:\n' + data.result.pageContent.slice(0, 1000), 'operator');
      }
      if (data.result?.screenshot) showScreenshot(data.result.screenshot);
      if (data.result?.history) showActions(data.result.history);
      showResult(data.result);
      break;
    case 'task_error':
      taskRunning = false;
      updateUI();
      removeThinking();
      addBot('❌ Error: ' + data.error, 'operator');
      break;
    case 'task_cancelled':
      taskRunning = false;
      updateUI();
      removeThinking();
      addSystem('⛔ Tarea cancelada');
      break;
    case 'log':
      addLogLine(data.text);
      // Show key events in chat
      if (data.text.includes('[Razonamiento]')) {
        addBot('🧠 ' + data.text.replace(/\[.*?\]\s*/g, ''), 'reasoning');
      } else if (data.text.includes('[Verificación]')) {
        addBot('🔍 ' + data.text.replace(/\[.*?\]\s*/g, ''), 'verify');
      } else if (data.text.includes('CAPTCHA detectado')) {
        addBot('⚠️ CAPTCHA detectado — se requiere intervención manual', 'system');
      } else if (data.text.includes('Login detectado')) {
        addBot('🔐 Login detectado — se requiere intervención manual', 'system');
      } else if (data.text.includes('REPLANIFICANDO')) {
        addBot('🔄 Replanificando estrategia...', 'reasoning');
      }
      break;
    case 'takeover':
      addBot('✋ ' + data.reason, 'system');
      break;
    case 'last_result':
      if (data.result?.screenshot) showScreenshot(data.result.screenshot);
      if (data.result?.history) showActions(data.result.history);
      break;
  }
};

ws.onclose = () => {
  document.getElementById('statusBadge').className = 'status-dot red';
  document.getElementById('statusText').textContent = 'Desconectado';
};

function updateUI() {
  const runBtn = document.getElementById('runBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const execBtn = document.getElementById('execBtn');
  const badge = document.getElementById('statusBadge');
  const statusText = document.getElementById('statusText');

  if (taskRunning) {
    badge.className = 'status-dot blue';
    statusText.textContent = 'Ejecutando...';
    runBtn.disabled = true;
    cancelBtn.disabled = false;
    execBtn.disabled = true;
  } else {
    badge.className = 'status-dot green';
    statusText.textContent = 'Listo';
    runBtn.disabled = false;
    cancelBtn.disabled = true;
    execBtn.disabled = false;
  }
}

// ── Chat Functions ──
function addUser(text) {
  const div = document.createElement('div');
  div.className = 'chat-msg user';
  div.textContent = text;
  document.getElementById('chatMessages').appendChild(div);
  scrollChat();
}

function addBot(text, model) {
  removeThinking();
  const div = document.createElement('div');
  div.className = 'chat-msg bot';
  div.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
  if (model) {
    div.innerHTML += `<div class="model-tag">${model}</div>`;
  }
  document.getElementById('chatMessages').appendChild(div);
  scrollChat();
}

function addSystem(text) {
  const div = document.createElement('div');
  div.className = 'chat-msg system';
  div.textContent = text;
  document.getElementById('chatMessages').appendChild(div);
  scrollChat();
}

function showThinking() {
  removeThinking();
  thinkingMsg = document.createElement('div');
  thinkingMsg.className = 'chat-msg thinking';
  thinkingMsg.textContent = 'Pensando';
  document.getElementById('chatMessages').appendChild(thinkingMsg);
  scrollChat();
}

function removeThinking() {
  if (thinkingMsg) {
    thinkingMsg.remove();
    thinkingMsg = null;
  }
}

function scrollChat() {
  const c = document.getElementById('chatMessages');
  c.scrollTop = c.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  addUser(text);
  input.value = '';
  showThinking();

  // Detect if it's a browser task
  const browserWords = /abre|navega|busca|click|visita|explora|scroll|abrir|haz click|escribe en|llena|compra|descarga/i;
  const hasUrl = /http|www\.|\.com|\.es|navegador|web|página|sitio/i;
  const isBrowserTask = browserWords.test(text) && hasUrl.test(text);

  if (isBrowserTask) {
    // Execute as browser task
    try {
      const resp = await fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task: text, headless: true }),
      });
      if (!resp.ok) {
        removeThinking();
        addBot('❌ Error al iniciar tarea', 'error');
      }
    } catch (e) {
      removeThinking();
      addBot('❌ Error: ' + e.message, 'error');
    }
  } else {
    // Chat with AI
    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await resp.json();
      removeThinking();
      addBot(data.reply || data.error || 'Sin respuesta', data.model || 'ai');
    } catch (e) {
      removeThinking();
      addBot('❌ Error: ' + e.message, 'error');
    }
  }
}

function execFromChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim() || document.getElementById('taskInput').value.trim();
  if (!text) { alert('Describe una tarea'); return; }
  document.getElementById('taskInput').value = text;
  runTask();
}

// ── Task Functions ──
async function runTask() {
  const task = document.getElementById('taskInput').value.trim();
  const url = document.getElementById('startUrl').value.trim();
  if (!task) { alert('Describe la tarea'); return; }

  addUser('执行: ' + task);
  showThinking();

  try {
    const resp = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task, url, headless: true }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      removeThinking();
      addBot('❌ Error: ' + (err.error || 'Unknown'), 'error');
    }
  } catch (e) {
    removeThinking();
    addBot('❌ Error: ' + e.message, 'error');
  }
}

async function cancelTask() {
  try {
    await fetch('/api/cancel', { method: 'POST' });
    addSystem('Cancelando...');
  } catch (e) {}
}

// ── UI Helpers ──
function showTab(name) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function addLogLine(text) {
  const container = document.getElementById('logContainer');
  const div = document.createElement('div');
  div.className = 'log-line';
  if (text.includes('[AI]') || text.includes('[Razonamiento]')) div.className += ' ai';
  else if (text.includes('[Operator]') || text.includes('Ejecutando')) div.className += ' action';
  else if (text.includes('Error') || text.includes('FAIL')) div.className += ' error';
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showScreenshot(base64) {
  document.getElementById('screenshotContainer').innerHTML = `<img src="data:image/png;base64,${base64}" alt="Screenshot">`;
  showTab('screenshot');
  document.querySelectorAll('.panel-tab')[1].click();
}

function showActions(history) {
  // Could show in result tab
}

function showResult(result) {
  const c = document.getElementById('resultContainer');
  if (!result) { c.textContent = 'Sin resultado'; return; }
  const status = result.success ? '✅ Exitoso' : '❌ Fallo';
  c.innerHTML = `${status}\n${result.message || ''}\nIteraciones: ${result.iterations || 0}\n\n${(result.extractedData || result.pageContent || '').slice(0, 2000)}`;
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// Init
updateUI();
fetch('/api/status').then(r => r.json()).then(data => {
  if (data.running) { taskRunning = true; updateUI(); }
  if (data.lastResult?.screenshot) showScreenshot(data.lastResult.screenshot);
}).catch(() => {});
</script>
</body>
</html>
