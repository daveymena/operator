<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCode</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a25; --border: #2a2a3a; --text: #e0e0ff; --text2: #8888aa; --primary: #8b5cf6; --primary-dim: rgba(139,92,246,0.15); --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    .app { display: flex; height: 100vh; }
    .sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-size: 18px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .sidebar-header h1 span { font-size: 20px; }
    .session-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: background 0.15s; display: flex; justify-content: space-between; align-items: center; }
    .session-item:hover { background: var(--bg3); }
    .session-item.active { background: var(--primary-dim); border: 1px solid rgba(139,92,246,0.3); }
    .session-item .name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .session-item .delete { opacity: 0; color: var(--red); cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 14px; }
    .session-item:hover .delete { opacity: 0.7; }
    .session-item .delete:hover { opacity: 1; background: rgba(239,68,68,0.15); }
    .new-session-btn { margin: 8px; padding: 10px; background: var(--primary-dim); border: 1px solid rgba(139,92,246,0.3); border-radius: 8px; color: var(--primary); cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; transition: all 0.15s; }
    .new-session-btn:hover { background: var(--primary); color: white; }
    .model-bar { padding: 12px 16px; border-top: 1px solid var(--border); }
    .model-bar label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); display: block; margin-bottom: 6px; }
    .model-bar select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; color: var(--text); font-size: 12px; outline: none; }
    .model-bar select:focus { border-color: var(--primary); }
    .chat-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg2); }
    .chat-header .status { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
    .chat-header .status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    .chat-header .status .dot.off { background: var(--red); }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .message.user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .message.assistant { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .message.error { align-self: flex-start; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .message.system { align-self: center; background: none; color: var(--text2); font-size: 12px; padding: 4px 12px; }
    .input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg2); }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .input-row textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 14px; font-family: inherit; resize: none; outline: none; min-height: 44px; max-height: 150px; line-height: 1.5; }
    .input-row textarea:focus { border-color: var(--primary); }
    .send-btn { width: 44px; height: 44px; border-radius: 10px; background: var(--primary); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; transition: opacity 0.15s; }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn.stop { background: var(--red); }
    .welcome { flex: 1; display: flex; align-items: center; justify-content: center; }
    .welcome-box { text-align: center; padding: 3rem; }
    .welcome-box h2 { font-size: 24px; margin-bottom: 8px; }
    .welcome-box p { color: var(--text2); font-size: 14px; max-width: 400px; }
    .welcome-box .shortcuts { display: flex; gap: 8px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .welcome-box .shortcut { padding: 8px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; }
    .welcome-box .shortcut:hover { border-color: var(--primary); color: var(--text); }
    .typing { display: flex; gap: 4px; padding: 8px 0; }
    .typing span { width: 6px; height: 6px; background: var(--text2); border-radius: 50%; animation: blink 1.4s infinite both; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }
    @media (max-width: 768px) {
      .sidebar { position: absolute; z-index: 100; left: -260px; height: 100%; transition: left 0.3s; }
      .sidebar.open { left: 0; }
      .message { max-width: 95%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1><span>⚡</span> OpenCode</h1>
      </div>
      <div class="session-list" id="sessionList"></div>
      <div class="new-session-btn" onclick="createSession()">+ Nueva Sesión</div>
      <div class="model-bar">
        <label>Modelo</label>
        <select id="modelSelect">
          <option value="opencode/big-pickle">Big Pickle - Gratis</option>
        </select>
      </div>
    </div>
    <div class="main">
      <div class="chat-header">
        <div class="status">
          <div class="dot" id="statusDot"></div>
          <span id="statusText">Conectando...</span>
        </div>
      </div>
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-box">
            <h2>OpenCode Evolved</h2>
            <p>Tu asistente de IA con acceso a archivos, terminal y navegador.</p>
            <div class="shortcuts">
              <div class="shortcut" onclick="sendQuick('Analiza este proyecto')">Analizar proyecto</div>
              <div class="shortcut" onclick="sendQuick('Crea un archivo hello.py')">Crear archivo</div>
              <div class="shortcut" onclick="sendQuick('Ejecuta ls -la')">Ejecutar comando</div>
            </div>
          </div>
        </div>
      </div>
      <div class="input-area">
        <div class="input-row">
          <textarea id="chatInput" placeholder="Escribe un mensaje..." rows="1" onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">▶</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    let sessions = [];
    let activeSessionId = null;
    let isStreaming = false;
    let abortController = null;

    checkHealth();
    loadSessions();
    loadModels();
    setInterval(checkHealth, 15000);

    const textarea = document.getElementById('chatInput');
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
    });

    async function checkHealth() {
      try {
        await fetch('/health');
        document.getElementById('statusDot').className = 'dot';
        document.getElementById('statusText').textContent = 'Conectado';
      } catch {
        document.getElementById('statusDot').className = 'dot off';
        document.getElementById('statusText').textContent = 'Desconectado';
      }
    }

    async function loadSessions() {
      try {
        const r = await fetch('/api/sessions');
        const d = await r.json();
        sessions = d.sessions || [];
        renderSessions();
        if (sessions.length > 0 && !activeSessionId) selectSession(sessions[0].id);
      } catch { sessions = []; renderSessions(); }
    }

    function renderSessions() {
      const el = document.getElementById('sessionList');
      el.innerHTML = sessions.map(s => `
        <div class="session-item ${s.id === activeSessionId ? 'active' : ''}" onclick="selectSession('${s.id}')">
          <span class="name">${s.title || s.slug || s.id.slice(0, 12)}</span>
          <span class="delete" onclick="event.stopPropagation(); deleteSession('${s.id}')">✕</span>
        </div>
      `).join('');
    }

    async function selectSession(id) {
      activeSessionId = id;
      renderSessions();
      await loadMessages(id);
    }

    async function loadMessages(sessionId) {
      const el = document.getElementById('messages');
      el.innerHTML = '';
      document.getElementById('welcome')?.remove();
      try {
        const r = await fetch(`/api/sessions/${sessionId}/messages`);
        const d = await r.json();
        (d.messages || []).forEach(m => addMessage(m.role, m.content));
      } catch {}
      el.scrollTop = el.scrollHeight;
    }

    async function createSession() {
      try {
        const r = await fetch('/api/sessions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        const d = await r.json();
        if (d.id) { await loadSessions(); selectSession(d.id); }
      } catch {}
    }

    async function deleteSession(id) {
      try {
        await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
        if (activeSessionId === id) activeSessionId = null;
        await loadSessions();
      } catch {}
    }

    async function loadModels() {
      try {
        const r = await fetch('/api/models');
        const d = await r.json();
        const sel = document.getElementById('modelSelect');
        sel.innerHTML = (d.models || []).map(m => `<option value="${m.id}">${m.name}</option>`).join('');
      } catch {}
    }

    function addMessage(role, content) {
      const el = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = content;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
      return div;
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function sendQuick(text) {
      textarea.value = text;
      sendMessage();
    }

    async function sendMessage() {
      const text = textarea.value.trim();
      if (!text || isStreaming) return;
      textarea.value = '';
      textarea.style.height = 'auto';
      document.getElementById('welcome')?.remove();
      addMessage('user', text);
      if (!activeSessionId) await createSession();
      const model = document.getElementById('modelSelect').value;
      isStreaming = true;
      updateSendBtn();
      const assistantDiv = addMessage('assistant', '');
      assistantDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      abortController = new AbortController();
      try {
        const r = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: activeSessionId, message: text, model }),
          signal: abortController.signal
        });
        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let fullContent = '';
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.type === 'delta' || data.type === 'done') {
                  if (data.content) { fullContent = data.content; assistantDiv.textContent = fullContent; document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight; }
                }
                if (data.type === 'error') { assistantDiv.className = 'message error'; assistantDiv.textContent = data.content; }
              } catch {}
            }
          }
        }
        if (!fullContent) assistantDiv.textContent = '(Sin respuesta)';
      } catch (err) {
        if (err.name !== 'AbortError') { assistantDiv.className = 'message error'; assistantDiv.textContent = `Error: ${err.message}`; }
      } finally {
        isStreaming = false; abortController = null; updateSendBtn();
      }
    }

    function updateSendBtn() {
      const btn = document.getElementById('sendBtn');
      if (isStreaming) {
        btn.innerHTML = '■'; btn.className = 'send-btn stop'; btn.onclick = () => { if (abortController) abortController.abort(); };
      } else {
        btn.innerHTML = '▶'; btn.className = 'send-btn'; btn.onclick = sendMessage;
      }
    }
  </script>
</body>
</html>
